# 臨時工具 workflow：在 runner 上驗證/修復成分縮圖的 Wikimedia 熱連結（沙箱打不到 wikimedia）。
# 觸發保護：commit message 含 [fix-photo-urls]（或手動 dispatch）才會跑。修完推回分支。
name: Fix ingredient photo URLs

on:
  push:
    branches: [claude/ingredient-thumbnails-image-logic-e6it91]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[fix-photo-urls]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify and fix cover URLs
        run: node scripts/fix-ingredient-photo-urls.mjs
      - name: Commit fixes back to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/ingredients
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "fix ingredient cover URLs to valid thumbnail buckets (auto)"
          git push origin HEAD:${{ github.ref_name }}
