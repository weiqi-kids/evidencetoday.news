name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Keep the static Shorts page in sync with new public YouTube uploads.
    - cron: '15 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_CHANNEL_ID: UCTejYxFd04qma-LY0_Z17NQ
      YOUTUBE_MAX_VIDEOS: 500
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check news source links
        run: pnpm check:news

      # 去 AI 味守門已併入 pnpm build（check-design && check-content && astro build，見 package.json），
      # 不再需要獨立 step。check-content 預設 grandfather（只掃相對 origin/main 的變動檔）：直推 main 時
      # CI 掃 0 檔，真正擋點在「提交前 pnpm build」（本地與 cron ops gate 都會跑）與 PR 的 content-audit.yml。
      - name: Myths quality gate
        run: pnpm check:myths

      - name: Build Astro
        # postbuild hook 已跑 pagefind --site dist（見 package.json），不需獨立 step 重跑索引。
        run: pnpm build

      - name: Remove local OG preview artifacts
        run: rm -rf dist/og-preview

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir dist --exclude "favicon\\.svg|favicon\\.ico|apple-touch-icon\\.png|og-preview/.*" dist/
          fail: true

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          # upload.wikimedia.org 排除：成分縮圖 27 條熱連結已由 fix-ingredient-photo-urls.mjs
          # 逐條 HEAD 200 驗證；lychee 併發打它會被 429 + Retry-After 拖住，曾讓本步卡 30 分鐘以上
          args: --no-progress --exclude-path dist/fonts --exclude-path dist/og-preview --exclude "upload\.wikimedia\.org" dist/
          fail: false
        continue-on-error: true

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          staticDistDir: ./dist
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 部署後把「上線的 sitemap 全部 URL」送 IndexNow（Bing/Yandex/Seznam/Naver 即時收錄；
  # Bing→ChatGPT 搜尋接地）。Google 不吃 IndexNow，一路仍靠 sitemap + GSC。
  # 只在 push / 手動時跑（排除每小時 schedule 部署，避免對 IndexNow 洗版）。
  # 金鑰非機密（本就公開託管於 /<key>.txt）；腳本任何失敗都 exit 0，不擋部署。
  indexnow:
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://evidencetoday.news
      INDEXNOW_KEY: d53c801c406ed5f98e8db8f1ac17bbbe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for Pages CDN propagation
        run: sleep 20

      - name: Submit sitemap URLs to IndexNow
        run: node scripts/indexnow-submit.mjs

  # 任一階段 fail → 發 Slack 要求修改；修正 push 後 workflow 自動重跑＝重審。
  # 需 repo secrets：SLACK_BOT_TOKEN、SLACK_CHANNEL_ID（缺則靜默略過）。
  notify-failure:
    needs: [build, deploy, indexnow]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL_ID" ]; then
            echo "Slack secrets not set; skip notify."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="🚨 ${{ github.repository }} 部署被守門擋下（commit ${GITHUB_SHA::7}）。請修正設計規範/建置錯誤後 push，workflow 會自動重審。詳情： $RUN_URL"
          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d "$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg t "$TEXT" '{channel:$ch,text:$t}')"
