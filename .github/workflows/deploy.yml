name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Keep the static Shorts page in sync with new public YouTube uploads.
    - cron: '15 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_CHANNEL_ID: UCTejYxFd04qma-LY0_Z17NQ
      YOUTUBE_MAX_VIDEOS: 500
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 需要前一個 commit 才能用 git diff 算出本次異動的內容頁（IndexNow 用）。
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check news source links
        run: pnpm check:news

      - name: Content AI-tone gate (blocks deploy on banned-opening / ai-phrase / vague-reference)
        run: pnpm content:audit

      - name: Myths quality gate
        run: pnpm check:myths

      - name: Build Astro
        # postbuild hook 已跑 pagefind --site dist（見 package.json），不需獨立 step 重跑索引。
        run: pnpm build

      - name: Remove local OG preview artifacts
        run: rm -rf dist/og-preview

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir dist --exclude "favicon\\.svg|favicon\\.ico|apple-touch-icon\\.png|og-preview/.*" dist/
          fail: true

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-path dist/fonts --exclude-path dist/og-preview dist/
          fail: false
        continue-on-error: true

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          staticDistDir: ./dist
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

      # 只在 push（非 cron/手動）時，把本次異動的內容頁推送 IndexNow（Bing→ChatGPT 搜尋接地）。
      # 失敗不阻擋 deploy；只送存在於 sitemap 的 URL（見 scripts/indexnow-submit.mjs）。
      - name: Notify IndexNow (changed content pages)
        if: github.event_name == 'push'
        env:
          INDEXNOW_KEY: d53c801c406ed5f98e8db8f1ac17bbbe
        run: |
          BASE=$(git rev-parse HEAD^ 2>/dev/null || true)
          if [ -z "$BASE" ]; then echo "[indexnow] 無父 commit，跳過。"; exit 0; fi
          git diff --name-only "$BASE" HEAD -- 'src/content/' | node scripts/indexnow-submit.mjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 任一階段 fail → 發 Slack 要求修改；修正 push 後 workflow 自動重跑＝重審。
  # 需 repo secrets：SLACK_BOT_TOKEN、SLACK_CHANNEL_ID（缺則靜默略過）。
  notify-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL_ID" ]; then
            echo "Slack secrets not set; skip notify."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="🚨 ${{ github.repository }} 部署被守門擋下（commit ${GITHUB_SHA::7}）。請修正設計規範/建置錯誤後 push，workflow 會自動重審。詳情： $RUN_URL"
          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d "$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg t "$TEXT" '{channel:$ch,text:$t}')"
