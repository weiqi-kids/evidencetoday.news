name: Content audit

on:
  pull_request:
    paths:
      - 'src/content/**'
      - 'scripts/audit-ai-tone.mjs'
      - 'package.json'
      - '.github/workflows/content-audit.yml'
  push:
    branches: [main]
    paths:
      - 'src/content/**'
      - 'scripts/audit-ai-tone.mjs'
      - 'package.json'
      - '.github/workflows/content-audit.yml'
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run content audit
        run: pnpm content:audit
