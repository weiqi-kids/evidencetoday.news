name: Content audit

on:
  pull_request:
    paths:
      - 'src/content/**'
      - 'scripts/check-content.mjs'
      - 'package.json'
      - '.github/workflows/content-audit.yml'
  push:
    branches: [main]
    paths:
      - 'src/content/**'
      - 'scripts/check-content.mjs'
      - 'package.json'
      - '.github/workflows/content-audit.yml'
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 全站去 AI 味普查（--all 恆 exit 0，只出報告不擋）。真正的擋點在 deploy 的 pnpm build
      # （check-content grandfather）與提交前本地 build；本 workflow 供每週排程/PR 產全站曝光報告。
      - name: Run content audit (full-site report)
        run: pnpm check:content:all
