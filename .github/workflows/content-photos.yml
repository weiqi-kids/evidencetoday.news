# 臨時 workflow：在 GitHub Actions runner（網路不受限）上跑 scripts/fetch-content-photos.mjs，
# 搜 Wikimedia Commons 候選封面到 tmp-photo-review/，推回本分支供 session 目視驗收後接線。
# 觸發：push 到本分支且 commit message 含 [fetch-photos]，或手動 workflow_dispatch。
# 任務完成後連同 scripts/fetch-content-photos.mjs 一併移除（比照 ingredient-photos.yml）。
name: Fetch content cover photos (temporary)

on:
  push:
    branches: [claude/trend-news-image-replacement-qcdbp4]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    # 只在 commit message 明確要求時跑，避免每次 push 都打 Commons
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[fetch-photos]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch candidate photos from Wikimedia Commons
        # 第二輪：只補搜第一輪 0 命中 / 目視驗收不合格的 slug（單一名詞覆寫關鍵字，見 OVERRIDE），
        # 合併進既有 manifest（其餘已驗收的候選不動）。全量重搜改回 `node scripts/fetch-content-photos.mjs`。
        run: node scripts/fetch-content-photos.mjs news:radar-2026-05-08-18-04 news:radar-2026-05-08-18-06 news:radar-2026-05-09-06-03 news:radar-2026-05-10-06-02 news:radar-2026-05-10-06-03 news:radar-2026-05-10-12-01 news:radar-2026-05-10-12-02 news:radar-2026-05-12-12-01 news:radar-2026-05-12-12-03 news:radar-2026-05-12-18-01 news:radar-2026-06-03-01 news:radar-2026-06-04-01 news:radar-2026-06-05-01 news:radar-2026-06-06-01 news:radar-2026-06-08-01 news:radar-2026-06-09-01 news:radar-2026-06-10-01 news:radar-2026-06-12-01 news:radar-2026-07-15-12-01 news:radar-2026-07-16-12-01 news:radar-2026-07-17-12-01 news:radar-2026-07-18-12-01 news:radar-2026-07-21-12-01 news:radar-2026-07-22-12-01 news:radar-2026-07-26-12-01 topics:lutein topics:sports-nutrition topics:gut-health

      - name: Commit candidates back to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tmp-photo-review
          if git diff --cached --quiet; then
            echo "no candidate changes to commit"
          else
            git commit -m "chore(photos): 搜圖 runner 回傳候選封面供驗收"
            git push origin HEAD:${{ github.ref_name }}
          fi
