<text x="110" y="130" font-size="34" font-family="Noto Sans TC, sans-serif" fill="#7c2d12" font-weight="700">本日有據 Evidence Today</text>
<text x="110" y="200" font-size="56" font-family="Noto Sans TC, sans-serif" fill="#111827" font-weight="700">維他命 C 能預防感冒嗎？</text>
