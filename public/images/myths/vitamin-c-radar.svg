<rect width="1200" height="630" fill="url(#bg2)"/>
<circle cx="1040" cy="140" r="86" fill="#ffcc80" opacity="0.6"/><circle cx="980" cy="190" r="42" fill="#ffd54f" opacity="0.7"/>
