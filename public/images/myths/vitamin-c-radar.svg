<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="維他命C能預防感冒嗎，判讀情境成立，證據強度中">
<defs><linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#fffde8"/></linearGradient></defs><rect width="1200" height="1200" fill="url(#bg2)"/>
<text x="90" y="110" font-size="36" font-family="Noto Sans TC, sans-serif" fill="#7c2d12" font-weight="700">本日有據 Evidence Today</text>
<text x="90" y="340" font-size="78" font-family="Noto Sans TC, sans-serif" fill="#111827" font-weight="800">維他命 C 能</text><text x="90" y="430" font-size="78" font-family="Noto Sans TC, sans-serif" fill="#111827" font-weight="800">預防感冒嗎？</text>
<rect x="90" y="520" rx="34" ry="34" width="330" height="80" fill="#e6f0ff"/><text x="122" y="573" font-size="44" font-family="Noto Sans TC, sans-serif" fill="#18427d" font-weight="700">判讀：情境成立</text>
<rect x="450" y="520" rx="34" ry="34" width="300" height="80" fill="#fff2dc"/><text x="482" y="573" font-size="44" font-family="Noto Sans TC, sans-serif" fill="#7a4b08" font-weight="700">證據強度：中</text>
<text x="90" y="760" font-size="46" font-family="Noto Sans TC, sans-serif" fill="#1f2937">一般人未必能明顯預防感冒，但特定情境與</text><text x="90" y="835" font-size="46" font-family="Noto Sans TC, sans-serif" fill="#1f2937">規律補充可能有不同結果。</text>
</svg>
