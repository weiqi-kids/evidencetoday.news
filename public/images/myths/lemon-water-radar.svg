<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="喝檸檬水真的可以排毒嗎，判讀過度簡化，證據強度低">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff9e8"/><stop offset="1" stop-color="#e8f7ef"/></linearGradient></defs><rect width="1200" height="1200" fill="url(#bg)"/>
<text x="90" y="110" font-size="36" font-family="Noto Sans TC, sans-serif" fill="#1d3b2e" font-weight="700">本日有據 Evidence Today</text>
<text x="90" y="340" font-size="78" font-family="Noto Sans TC, sans-serif" fill="#0f172a" font-weight="800">喝檸檬水真的</text><text x="90" y="430" font-size="78" font-family="Noto Sans TC, sans-serif" fill="#0f172a" font-weight="800">可以排毒嗎？</text>
<rect x="90" y="520" rx="34" ry="34" width="370" height="80" fill="#fff1db"/><text x="122" y="573" font-size="44" font-family="Noto Sans TC, sans-serif" fill="#7a4b08" font-weight="700">判讀：過度簡化</text>
<rect x="490" y="520" rx="34" ry="34" width="300" height="80" fill="#e7efff"/><text x="522" y="573" font-size="44" font-family="Noto Sans TC, sans-serif" fill="#1e3a8a" font-weight="700">證據強度：低</text>
<text x="90" y="760" font-size="48" font-family="Noto Sans TC, sans-serif" fill="#1f2937">補充水分有幫助，但「排毒」不能簡化成</text><text x="90" y="835" font-size="48" font-family="Noto Sans TC, sans-serif" fill="#1f2937">靠單一飲品完成。</text>
</svg>
