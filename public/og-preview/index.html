<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>本日有據 OG 縮圖預覽</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; background: #f7f7f2; color: #303136; }
    body { margin: 0; padding: 32px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .note { margin: 0 0 28px; color: #526168; line-height: 1.7; }
    .card { margin: 0 0 34px; padding: 24px; border: 1px solid #dce3e3; border-radius: 24px; background: #fff; }
    .path { margin: 0 0 18px; font-weight: 800; color: #253445; }
    .grid { display: grid; grid-template-columns: minmax(280px, 1fr); gap: 20px; }
    .sizes { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 20px; }
    figure { margin: 0; }
    figcaption { margin-bottom: 8px; font-size: 14px; font-weight: 800; color: #1f6f72; }
    img { display: block; max-width: 100%; height: auto; border: 1px solid #e6ebeb; background: #f7f7f2; }
    .original img { width: min(100%, 720px); }
  </style>
</head>
<body>
  <h1>本日有據 OG 縮圖預覽</h1>
  <p class="note">用來檢查 1200×630 原圖，以及手機、平板、桌機分享預覽尺寸。手機縮圖應優先確認主字、品牌識別與內容類型是否一眼可辨。</p>
  <section class="card">
    <p class="path">/og/videos/index.png</p>
    <div class="grid">
      <figure class="original"><figcaption>原始 1200×630</figcaption><img src="./videos__index__original.png" alt="videos/index.png 原始 OG"></figure>
      <div class="sizes">
        <figure><figcaption>手機 LINE 小縮圖（240px）</figcaption><img src="./videos__index__mobile.png" width="240" alt="videos/index.png 手機 LINE 小縮圖"></figure><figure><figcaption>平板中圖（480px）</figcaption><img src="./videos__index__tablet.png" width="480" alt="videos/index.png 平板中圖"></figure><figure><figcaption>桌機大圖（720px）</figcaption><img src="./videos__index__desktop.png" width="720" alt="videos/index.png 桌機大圖"></figure>
      </div>
    </div>
  </section>
<section class="card">
    <p class="path">/og/ingredients/index.png</p>
    <div class="grid">
      <figure class="original"><figcaption>原始 1200×630</figcaption><img src="./ingredients__index__original.png" alt="ingredients/index.png 原始 OG"></figure>
      <div class="sizes">
        <figure><figcaption>手機 LINE 小縮圖（240px）</figcaption><img src="./ingredients__index__mobile.png" width="240" alt="ingredients/index.png 手機 LINE 小縮圖"></figure><figure><figcaption>平板中圖（480px）</figcaption><img src="./ingredients__index__tablet.png" width="480" alt="ingredients/index.png 平板中圖"></figure><figure><figcaption>桌機大圖（720px）</figcaption><img src="./ingredients__index__desktop.png" width="720" alt="ingredients/index.png 桌機大圖"></figure>
      </div>
    </div>
  </section>
<section class="card">
    <p class="path">/og/news/index.png</p>
    <div class="grid">
      <figure class="original"><figcaption>原始 1200×630</figcaption><img src="./news__index__original.png" alt="news/index.png 原始 OG"></figure>
      <div class="sizes">
        <figure><figcaption>手機 LINE 小縮圖（240px）</figcaption><img src="./news__index__mobile.png" width="240" alt="news/index.png 手機 LINE 小縮圖"></figure><figure><figcaption>平板中圖（480px）</figcaption><img src="./news__index__tablet.png" width="480" alt="news/index.png 平板中圖"></figure><figure><figcaption>桌機大圖（720px）</figcaption><img src="./news__index__desktop.png" width="720" alt="news/index.png 桌機大圖"></figure>
      </div>
    </div>
  </section>
<section class="card">
    <p class="path">/og/videos/blanch-spinach-oxalate.png</p>
    <div class="grid">
      <figure class="original"><figcaption>原始 1200×630</figcaption><img src="./videos__blanch-spinach-oxalate__original.png" alt="videos/blanch-spinach-oxalate.png 原始 OG"></figure>
      <div class="sizes">
        <figure><figcaption>手機 LINE 小縮圖（240px）</figcaption><img src="./videos__blanch-spinach-oxalate__mobile.png" width="240" alt="videos/blanch-spinach-oxalate.png 手機 LINE 小縮圖"></figure><figure><figcaption>平板中圖（480px）</figcaption><img src="./videos__blanch-spinach-oxalate__tablet.png" width="480" alt="videos/blanch-spinach-oxalate.png 平板中圖"></figure><figure><figcaption>桌機大圖（720px）</figcaption><img src="./videos__blanch-spinach-oxalate__desktop.png" width="720" alt="videos/blanch-spinach-oxalate.png 桌機大圖"></figure>
      </div>
    </div>
  </section>
<section class="card">
    <p class="path">/og/podcasts/ep01.png</p>
    <div class="grid">
      <figure class="original"><figcaption>原始 1200×630</figcaption><img src="./podcasts__ep01__original.png" alt="podcasts/ep01.png 原始 OG"></figure>
      <div class="sizes">
        <figure><figcaption>手機 LINE 小縮圖（240px）</figcaption><img src="./podcasts__ep01__mobile.png" width="240" alt="podcasts/ep01.png 手機 LINE 小縮圖"></figure><figure><figcaption>平板中圖（480px）</figcaption><img src="./podcasts__ep01__tablet.png" width="480" alt="podcasts/ep01.png 平板中圖"></figure><figure><figcaption>桌機大圖（720px）</figcaption><img src="./podcasts__ep01__desktop.png" width="720" alt="podcasts/ep01.png 桌機大圖"></figure>
      </div>
    </div>
  </section>
</body>
</html>
