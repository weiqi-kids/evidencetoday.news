name = "evidencetoday-ai-suggest"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# 非同步生圖工單暫存（前端輪詢取件）。
# ⚠️ 部署前先建 KV namespace 並把 id 換成真值：
#   npx wrangler kv namespace create GEN_JOBS
[[kv_namespaces]]
binding = "GEN_JOBS"
id = "420c83f99beb4a30928fd066158dabda"

# 生圖工作佇列：/generate-async 入列 → consumer 背景生圖（不受 request/waitUntil 時限，失敗自動重試）。
# ⚠️ 部署前先建佇列：npx wrangler queues create evidencetoday-gen
[[queues.producers]]
binding = "GEN_QUEUE"
queue = "evidencetoday-gen"

[[queues.consumers]]
queue = "evidencetoday-gen"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 2

[vars]
ALLOWED_ORIGIN = "https://evidencetoday.news"
ANTHROPIC_MODEL = "claude-haiku-4-5-20251001"
GITHUB_OWNER = "weiqi-kids"
GITHUB_REPO = "evidencetoday.news"
# OpenAI 生圖模型：沿用 appi 的 gpt-image-2（此帳號金鑰可用）。
OPENAI_IMAGE_MODEL = "gpt-image-2"
# 壓低延遲（gpt-image 預設畫質約 60s+ 易逾時，low 約 40s）。
OPENAI_IMAGE_QUALITY = "low"
